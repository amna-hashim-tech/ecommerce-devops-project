<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
        }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: #fafafa;
            color: #222;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: white;
            border-bottom: 1px solid #ddd;
            padding: 18px 0;
        }
        
        .header-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.4em;
            font-weight: 700;
            color: #111;
        }
        
        .status {
            font-size: 0.8em;
            color: #28a745;
        }
        
        .main {
            flex: 1;
            max-width: 1100px; 
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        h1 {
            font-size: 1.8em;
            margin-bottom: 30px;
            font-weight: 600;
        }
        
        .products { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
        }
        
        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 20px;
        }
        
        .card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .name { 
            font-size: 1.1em; 
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .price { 
            color: #c7254e; 
            font-size: 1.2em; 
            font-weight: 600;
            margin: 8px 0;
        }
        
        .stock { 
            color: #666; 
            font-size: 0.85em;
            margin-bottom: 16px;
        }
        
        button {
            background: #111;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            width: 100%;
        }
        
        button:hover { 
            background: #333;
        }
        
        .footer {
            background: white;
            border-top: 1px solid #ddd;
            text-align: center;
            padding: 20px;
            font-size: 0.85em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">TechMart</div>
            <div class="status" id="status">●</div>
        </div>
    </div>

    <div class="main">
        <h1>Products</h1>
        <div class="products" id="products"></div>
    </div>

    <div class="footer">
        Dockerized Microservices | DevOps Project
    </div>

    <script>
        fetch('http://127.0.0.1:5000/products')
            .then(r => r.json())
            .then(data => {
                document.getElementById('status').textContent = '● Connected';
                document.getElementById('products').innerHTML = data.map(p => `
                    <div class="card">
                        <div class="name">${p.name}</div>
                        <div class="price">AED ${p.price.toLocaleString()}</div>
                        <div class="stock">${p.stock} available</div>
                        <button>Add to Cart</button>
                    </div>
                `).join('');
            })
            .catch(() => {
                document.getElementById('status').textContent = '● Offline';
            });
    </script>
</body>
</html>
